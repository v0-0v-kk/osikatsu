<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oshi Live Board</title>
    <link rel="stylesheet" href="style.css" />
    <script src="common.js" defer></script>
  </head>
  <body>
    <!-- 全体の下地背景 -->
    <div class="app-background"></div>

    <!-- カウントダウンと再設定ボタンの固定ヘッダー -->
    <div class="countdown-bar" id="theme-bar">
      <div class="countdown-text">
        <span>
          ライブ
          <span id="countdown-timer">--日 --時間 --分 --秒</span>
        </span>
      </div>
      <!-- ⚙️ 再設定ボタン -->
      <button class="settings-trigger" onclick="openSetupModal()" title="設定を変更する">⚙️</button>
    </div>

    <!-- メインコンテンツエリア -->
    <div class="content">
      <!-- タイトルヘッダー -->
      <div class="header">
        <h1 id="app-title">Oshi Live Board</h1>
      </div>

      <!-- 推しビジュアルをメインに配置するエリア -->
      <div class="nui-photo-area">
        <div class="nui-photo"></div>

        <!-- ==========================================
           画像ステッカーメニュー（各HTMLへジャンプ）
           ========================================== -->

        <!-- 1. 持ち物 (motimono.png) -->
        <a href="motimono.html" class="sticker-wrapper item-belongings">
          <div class="tape-deco"></div>
          <div class="sticker-menu">
            <!-- 背景を白（#ffffff）にするため、styleにbackground-colorを追加しています -->
            <img
              class="sticker-img-content"
              src="motimono.png"
              alt="持ち物"
              style="background-color: #ffffff"
              onerror="this.src = 'https://placehold.co/300x150/ffffff/7d6b5e?text=🎒+持ち物'"
            />
          </div>
        </a>

        <!-- 2. 会場 (kaizyo.png) -->
        <a href="kaizyo.html" class="sticker-wrapper item-venue">
          <div class="tape-deco"></div>
          <div class="sticker-menu">
            <img
              class="sticker-img-content"
              src="kaizyo.png"
              alt="会場"
              style="background-color: #ffffff"
              onerror="this.src = 'https://placehold.co/300x150/ffffff/7d6b5e?text=📍+会場'"
            />
          </div>
        </a>

        <!-- 3. 過ごし方 (sugosikata.png) -->
        <a href="sugosikata.html" class="sticker-wrapper item-howtospend">
          <div class="tape-deco"></div>
          <div class="sticker-menu">
            <img
              class="sticker-img-content"
              src="sugosikata.png"
              alt="過ごし方"
              style="background-color: #ffffff"
              onerror="this.src = 'https://placehold.co/300x150/ffffff/7d6b5e?text=⏳+過ごし方'"
            />
          </div>
        </a>

        <!-- 4. 番外編 (bangaihen.png) -->
        <a href="bangaihen.html" class="sticker-wrapper item-extra">
          <div class="tape-deco"></div>
          <div class="sticker-menu">
            <img
              class="sticker-img-content"
              src="bangaihen.png"
              alt="番外編"
              style="background-color: #ffffff"
              onerror="this.src = 'https://placehold.co/300x150/ffffff/7d6b5e?text=🎁+番外編'"
            />
          </div>
        </a>
      </div>

      <div class="footer-space"></div>
    </div>

    <!-- ==========================================
       【設定モーダル】（起動時 ＆ ⚙️ボタンクリック時）
       ========================================== -->
    <div id="setup-modal" class="custom-modal setup-active">
      <div class="modal-window setup-window">
        <div class="setup-header">
          <h2>参戦の準備をするよ！</h2>
          <span id="setup-close-btn" class="close-btn" onclick="closeSetupModal()" style="display: none">&times;</span>
        </div>
        <p class="setup-intro">ライブ情報とあなたの推し色を教えてね！</p>

        <div class="input-group">
          <label for="input-title">ライブ・ツアー名</label>
          <input type="text" id="input-title" placeholder="例: OSHI FIRST LIVE" value="Oshi Live Board" />
        </div>

        <div class="input-group">
          <label for="input-date">参戦する日（ライブ当日）</label>
          <input type="date" id="input-date" />
        </div>

        <!-- 🎨 自由なカラーピッカー（カラーパレット風） -->
        <div class="input-group">
          <label for="input-color">推しのメンバーカラー</label>
          <div class="color-picker-wrapper">
            <input type="color" id="input-color" value="#f2d1c9" />
            <span class="color-picker-label">パレットをタップして好きな色を選んでね！</span>
          </div>
        </div>

        <button class="save-btn" id="setup-save-btn" onclick="saveSettings()">この設定で参戦準備！</button>
      </div>
    </div>

    <!-- JavaScript：設定とパレット変更の制御 -->
    <script>
      // 16進数カラーコードを、少し暗い（ダーク）色と不透明度0.7のテープ用カラーに変換する補助関数
      function adjustColor(hex, percent) {
        let num = parseInt(hex.replace("#", ""), 16),
          amt = Math.round(2.55 * percent),
          R = (num >> 16) + amt,
          G = ((num >> 8) & 0x00ff) + amt,
          B = (num & 0x0000ff) + amt;
        return (
          "#" +
          (
            0x1000000 +
            (R < 255 ? (R < 0 ? 0 : R) : 255) * 0x10000 +
            (G < 255 ? (G < 0 ? 0 : G) : 255) * 0x100 +
            (B < 255 ? (B < 0 ? 0 : B) : 255)
          )
            .toString(16)
            .slice(1)
        );
      }

      function hexToRgba(hex, alpha) {
        let r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      window.addEventListener("DOMContentLoaded", () => {
        const savedTitle = localStorage.getItem("oshi_trip_title");
        const savedDate = localStorage.getItem("oshi_trip_date");
        const savedColor = localStorage.getItem("oshi_color") || "#f2d1c9";

        if (savedTitle) {
          document.getElementById("app-title").innerText = savedTitle;
          document.getElementById("input-title").value = savedTitle;
        }
        if (savedDate) {
          document.getElementById("input-date").value = savedDate;
          updateCountdown(savedDate);
          document.getElementById("setup-modal").classList.remove("setup-active");
          document.getElementById("setup-close-btn").style.display = "block";
        } else {
          const defaultDate = new Date();
          defaultDate.setDate(defaultDate.getDate() + 7);
          document.getElementById("input-date").value = defaultDate.toISOString().split("T")[0];
        }

        document.getElementById("input-color").value = savedColor;
        applyThemeColor(savedColor);
      });

      function saveSettings() {
        const titleInput = document.getElementById("input-title").value;
        const dateInput = document.getElementById("input-date").value;
        const colorInput = document.getElementById("input-color").value;

        if (!dateInput) {
          alert("参戦する日を選んでね！");
          return;
        }

        localStorage.setItem("oshi_trip_title", titleInput);
        localStorage.setItem("oshi_trip_date", dateInput);
        localStorage.setItem("oshi_color", colorInput);

        document.getElementById("app-title").innerText = titleInput;
        updateCountdown(dateInput);
        applyThemeColor(colorInput);

        document.getElementById("setup-modal").classList.remove("setup-active");
        document.getElementById("setup-close-btn").style.display = "block";
      }

      function applyThemeColor(hexColor) {
        const darkColor = adjustColor(hexColor, -15); // やや暗い色
        const tapeColor = hexToRgba(hexColor, 0.7); // 半透明色

        document.documentElement.style.setProperty("--theme-main", hexColor);
        document.documentElement.style.setProperty("--theme-dark", darkColor);
        document.documentElement.style.setProperty("--theme-tape", tapeColor);
      }

      // グローバルでタイマーのIDを管理する変数
      let countdownInterval;

      function updateCountdown(targetDateStr) {
        // すでに動いているタイマーがあれば一度止める
        if (countdownInterval) {
          clearInterval(countdownInterval);
        }

        const targetDate = new Date(targetDateStr);
        // ライブ当日の「午前0時0分0秒」をターゲットにします
        // もし開演時間(例: 17:00)に合わせたい場合は、targetDate.setHours(17, 0, 0, 0) などに調整も可能です
        targetDate.setHours(0, 0, 0, 0);

        function refreshTimer() {
          const now = new Date();
          const differenceInTime = targetDate.getTime() - now.getTime();

          const timerSpan = document.getElementById("countdown-timer");
          if (!timerSpan) return;

          if (differenceInTime <= 0) {
            // 当日または終了後の表示
            const isSameDay = now.toDateString() === targetDate.toDateString();
            if (isSameDay) {
              timerSpan.innerHTML = "<strong>本日開催！🔥 最高の1日にしよう！</strong>";
            } else {
              timerSpan.innerHTML = "<strong>無事終了✨ 思い出は永遠に！</strong>";
            }
            clearInterval(countdownInterval);
            return;
          }

          // ミリ秒から日・時間・分・秒を計算
          const days = Math.floor(differenceInTime / (1000 * 60 * 60 * 24));
          const hours = Math.floor((differenceInTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((differenceInTime % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((differenceInTime % (1000 * 60)) / 1000);

          // 1桁の数字のときに「05秒」のように2桁で揃える（見た目を美しくするため）
          const formatSec = String(seconds).padStart(2, "0");
          const formatMin = String(minutes).padStart(2, "0");
          const formatHrs = String(hours).padStart(2, "0");

          timerSpan.innerHTML = `あと <strong>${days}</strong>日 <strong>${formatHrs}</strong>時間 <strong>${formatMin}</strong>分 <strong>${formatSec}</strong>秒`;
        }

        // 最初に1回実行し、その後は1秒（1000ミリ秒）ごとにずっと実行し続ける
        refreshTimer();
        countdownInterval = setInterval(refreshTimer, 1000);
      }
    </script>
  </body>
</html>
