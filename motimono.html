<!doctype html>
<html lang="ja">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>持ち物リスト - Oshi Live Board</title>
    <link rel="stylesheet" href="style.css" />
    <script src="common.js" defer></script>
    <style>
      .filter-section {
        background-color: #faf6f0;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 16px;
        border: 1px solid #ecdcd0;
      }
      .filter-title {
        font-size: 13px;
        color: #7d6b5e;
        font-weight: bold;
        margin-bottom: 8px;
      }
      .chip-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .chip-container:last-child {
        margin-bottom: 0;
      }
      .filter-chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 20px;
        background-color: #fff;
        border: 1px solid #ecdcd0;
        font-size: 12px;
        color: #7d6b5e;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
      }
      .filter-chip input[type="checkbox"] {
        display: none;
      }
      .filter-chip.active {
        background-color: var(--theme-main);
        color: #fff;
        border-color: var(--theme-main);
      }
      .section-title {
        font-size: 14px;
        color: #7d6b5e;
        margin: 18px 0 8px 0;
        padding-bottom: 4px;
        border-bottom: 2px dashed var(--theme-main);
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: bold;
      }
      .checklist {
        padding: 0;
        margin: 0;
      }
      .checklist li {
        list-style: none;
        margin-bottom: 10px;
        background: #fff;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #eee;
      }
      .checklist li label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 13px;
        cursor: pointer;
        color: #4a3e3d;
        width: 100%;
      }
      .checklist input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin-top: 2px;
        cursor: pointer;
      }
      .checklist input[type="checkbox"]:checked + span {
        color: #b5a49e !important;
        text-decoration: line-through !important;
        opacity: 0.6;
      }
      .item-desc {
        display: block;
        font-size: 11px;
        color: #9c8a82;
        margin-top: 2px;
      }
      .genre-tips-box {
        margin-top: 20px;
        background-color: #fffbeb;
        border: 2px solid #fcd34d;
        border-radius: 12px;
        padding: 14px;
      }
      .genre-tips-title {
        font-size: 13px;
        font-weight: bold;
        color: #92400e;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .genre-tips-list {
        padding-left: 18px;
        margin: 0;
        font-size: 12px;
        color: #78350f;
        line-height: 1.6;
      }
      .genre-tips-list li {
        margin-bottom: 6px;
      }
      .genre-tips-list li:last-child {
        margin-bottom: 0;
      }
      .memo-area {
        margin-top: 20px;
        background-color: #faf6f0;
        border-radius: 16px;
        padding: 16px;
        border: 1px dashed #ecdcd0;
      }
      .memo-area h3 {
        font-size: 13px;
        color: #7d6b5e;
        margin-bottom: 8px;
      }
      .memo-area textarea {
        width: 100%;
        height: 80px;
        border: 1px solid #ecdcd0;
        border-radius: 10px;
        padding: 8px;
        font-size: 12px;
        font-family: inherit;
        resize: none;
        outline: none;
        color: #4a3e3d;
      }
    </style>
  </head>

    <div class="app-background"></div>

      <div class="countdown-text">

      </div>
      <button class="settings-trigger" onclick="openSetupModal()" title="設定を変更する">⚙️</button>
    </div>

    <div id="setup-modal" class="custom-modal">
      <div class="modal-window setup-window">
        <div class="setup-header">
          <h2>参戦の準備をするよ！</h2>
          <span id="setup-close-btn" class="close-btn" onclick="closeSetupModal()">&times;</span>
        </div>
        <p class="setup-intro">ライブ情報とあなたの推し色を教えてね！</p>
        <div class="input-group">
          <label for="input-title">ライブ・ツアー名</label>
          <input type="text" id="input-title" placeholder="例: OSHI FIRST LIVE" value="Oshi Live Board" />
        </div>
        <div class="input-group">
          <label for="input-date">参戦する日（ライブ当日）</label>
          <input type="date" id="input-date" />
        </div>
        <div class="input-group">
          <label for="input-color">推しのメンバーカラー</label>
          <div class="color-picker-wrapper">
            <input type="color" id="input-color" value="#f2d1c9" />
            <span class="color-picker-label">パレットをタップして好きな色を選んでね！</span>
          </div>
        </div>
        <button class="save-btn" id="setup-save-btn" onclick="saveSettings()">この設定で参戦準備！</button>
      </div>
    </div>

      window.addEventListener("DOMContentLoaded", () => {
        const memoField = document.getElementById("custom-memo");
        const checkboxes = document.querySelectorAll('.filter-chip input[type="checkbox"]');

        checkboxes.forEach((cb) => {
          const savedValue = localStorage.getItem(`filter_${cb.name}_${cb.value}`);
          if (savedValue === "true") {
            cb.checked = true;
            cb.parentElement.classList.add("active");
          }

          cb.addEventListener("change", () => {
            if (cb.checked) {
              cb.parentElement.classList.add("active");
            } else {
              cb.parentElement.classList.remove("active");
            }
            localStorage.setItem(`filter_${cb.name}_${cb.value}`, cb.checked);
            renderChecklist();
          });
        });

        const savedMemo = localStorage.getItem("oshi_live_memo");
        if (savedMemo) memoField.value = savedMemo;
        memoField.addEventListener("input", () => {
          localStorage.setItem("oshi_live_memo", memoField.value);
        });

        function renderChecklist() {
          const activeTags = ["all"];
          const activeGenres = [];

          checkboxes.forEach((cb) => {
            if (cb.checked) {
              activeTags.push(cb.value);
              if (cb.name === "genre") {
                activeGenres.push(cb.value);
              }
            }
          });

          const filteredItems = itemDatabase.filter((item) => {
            return item.tags.some((tag) => activeTags.includes(tag));
          });

          const groups = {};
          filteredItems.forEach((item) => {
            if (!groups[item.category]) {
              groups[item.category] = [];
            }
            groups[item.category].push(item);
          });

          const container = document.getElementById("item-list-container");
          container.innerHTML = "";

          for (const [categoryName, items] of Object.entries(groups)) {
            const titleDiv = document.createElement("div");
            titleDiv.className = "section-title";
            titleDiv.innerText = categoryName;
            container.appendChild(titleDiv);

            const ul = document.createElement("ul");
            ul.className = "checklist";

            items.forEach((item) => {
              const li = document.createElement("li");
              const storageKey = `item_checked_${item.name}`;
              const isChecked = localStorage.getItem(storageKey) === "true";

              li.innerHTML = `
              <label>
                <input type="checkbox" data-key="${storageKey}" ${isChecked ? "checked" : ""}>
                <span>
                  <strong>${item.name}</strong>
                  <span class="item-desc">${item.desc}</span>
                </span>
              </label>
            `;

              const cb = li.querySelector('input[type="checkbox"]');
              cb.addEventListener("change", () => {
                localStorage.setItem(storageKey, cb.checked);
              });

              ul.appendChild(li);
            });

            container.appendChild(ul);
          }

          activeGenres.forEach((genreKey) => {
            if (genreTips[genreKey]) {
              const tipData = genreTips[genreKey];
              const tipsBox = document.createElement("div");
              tipsBox.className = "genre-tips-box";

              let tipsListHtml = `<div class="genre-tips-title">⭐️ ${tipData.title}</div><ul class="genre-tips-list">`;
              tipData.tips.forEach((tip) => {
                tipsListHtml += `<li>${tip}</li>`;
              });
              tipsListHtml += `</ul>`;

              tipsBox.innerHTML = tipsListHtml;
              container.appendChild(tipsBox);
            }
          });

          if (filteredItems.length === 0) {
            container.innerHTML =
              '<p style="text-align:center; color:#9c8a82; font-size:12px; margin: 20px 0;">上の選択肢をタップすると、ここに持ち物リストが表示されるよ！</p>';
          }
        }

        renderChecklist();
      });
    </script>
