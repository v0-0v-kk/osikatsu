<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>会場・アクセス情報 - Oshi Live Board</title>
    <link rel="stylesheet" href="style.css" />
    <script src="common.js" defer></script>
    <style>
      .venue-header-card {
        background: #fff;
        border-radius: 16px;
        padding: 16px;
        border: 2px solid var(--theme-main, #ecdcd0);
        margin-bottom: 16px;
        box-shadow: 0 4px 12px rgba(125, 107, 94, 0.08);
      }
      .venue-header-title {
        font-size: 11px;
        color: #9c8a82;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .live-title-input {
        width: 100%;
        font-size: 18px;
        font-weight: bold;
        color: #4a3e3d;
        border: none;
        border-bottom: 2px dashed #ecdcd0;
        padding: 6px 0;
        outline: none;
        background: transparent;
      }
      .live-title-input:focus {
        border-bottom-color: var(--theme-main, #d86d8a);
      }
      .form-section {
        background: #fff;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 16px;
        border: 1px solid #ecdcd0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      }
      .form-section-title {
        font-size: 14px;
        font-weight: bold;
        color: #7d6b5e;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        border-bottom: 1px solid #f2e9e1;
        padding-bottom: 6px;
      }
      .input-field-group {
        margin-bottom: 12px;
      }
      .input-field-group:last-child {
        margin-bottom: 0;
      }
      .input-field-group label {
        display: block;
        font-size: 11px;
        font-weight: bold;
        color: #9c8a82;
        margin-bottom: 4px;
      }
      .input-text,
      .input-textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ecdcd0;
        border-radius: 10px;
        font-size: 13px;
        color: #4a3e3d;
        outline: none;
        box-sizing: border-box;
        font-family: inherit;
        background: #faf6f0;
      }
      .input-textarea {
        height: 70px;
        resize: none;
      }
      .input-text:focus,
      .input-textarea:focus {
        border-color: var(--theme-main, #d86d8a);
        background: #fff;
      }
      .map-container {
        margin-top: 10px;
        width: 100%;
        height: 200px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #ecdcd0;
        background: #f7f2ed;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9c8a82;
        font-size: 12px;
      }
      .map-container iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .img-upload-box {
        margin-top: 8px;
      }
      .img-preview {
        width: 100%;
        max-height: 220px;
        object-fit: contain;
        border-radius: 10px;
        border: 1px solid #ecdcd0;
        margin-top: 8px;
        background: #f7f2ed;
        display: none;
      }
      .file-input-btn {
        display: inline-block;
        padding: 8px 14px;
        background: #faf6f0;
        border: 1px dashed #c0b0a5;
        border-radius: 8px;
        font-size: 12px;
        color: #7d6b5e;
        cursor: pointer;
        width: 100%;
        text-align: center;
        box-sizing: border-box;
      }
      .file-input-btn:hover {
        background: #f2e9e1;
      }
      .file-input-real {
        display: none;
      }
      .save-status {
        text-align: right;
        font-size: 11px;
        color: #b0a095;
        margin-top: -8px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="app-background"></div>

    <div class="countdown-bar" id="theme-bar">
      <div class="countdown-text">
        <span id="app-title-display" style="margin-right: 10px; font-weight: bold">Oshi Live Board</span>
        <span id="countdown-timer">--日 --時間 --分 --秒</span>
      </div>
      <button class="settings-trigger" onclick="openSetupModal()" title="設定を変更する">⚙️</button>
    </div>

    <div id="setup-modal" class="custom-modal">
      <div class="modal-window setup-window">
        <div class="setup-header">
          <h2>参戦の準備をするよ！</h2>
          <span id="setup-close-btn" class="close-btn" onclick="closeSetupModal()">&times;</span>
        </div>
        <p class="setup-intro">ライブ情報とあなたの推し色を教えてね！</p>
        <div class="input-group">
          <label for="input-title">ライブ・ツアー名</label>
          <input type="text" id="input-title" placeholder="例: OSHI FIRST LIVE" value="Oshi Live Board" />
        </div>
        <div class="input-group">
          <label for="input-date">参戦する日（ライブ当日）</label>
          <input type="date" id="input-date" />
        </div>
        <div class="input-group">
          <label for="input-color">推しのメンバーカラー</label>
          <div class="color-picker-wrapper">
            <input type="color" id="input-color" value="#f2d1c9" />
            <span class="color-picker-label">パレットをタップして好きな色を選んでね！</span>
          </div>
        </div>
        <button class="save-btn" id="setup-save-btn" onclick="saveSettings()">この設定で参戦準備！</button>
      </div>
    </div>

    <div class="content sub-page">
      <div class="sub-header">
        <a href="index.html" class="back-btn">TOPに戻る</a>
        <h2>会場・アクセスメモ</h2>
      </div>

      <div class="card">
        <!-- 🎨 ステッカー配置：チケット＆双眼鏡 -->
        <svg
          class="sticker stk-ticket"
          style="top: -15px; right: -8px"
          viewBox="0 0 120 70"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g stroke="#7d6b5e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M 10,10 L 110,10 A 8,8 0 0,1 110,30 A 8,8 0 0,1 110,50 L 10,50 A 8,8 0 0,1 10,30 A 8,8 0 0,1 10,10 Z"
              fill="#fff"
              stroke="#fff"
              stroke-width="10"
            />
            <path
              d="M 10,10 L 110,10 A 8,8 0 0,1 110,30 A 8,8 0 0,1 110,50 L 10,50 A 8,8 0 0,1 10,30 A 8,8 0 0,1 10,10 Z"
              fill="#ffe4e1"
            />
            <line x1="35" y1="10" x2="35" y2="50" stroke="#7d6b5e" stroke-dasharray="3 3" />
            <path d="M 60,25 C 55,20 48,27 60,36 C 72,27 65,20 60,25 Z" fill="#f2a6b4" stroke="none" />
            <circle cx="22" cy="30" r="4" fill="#fcd34d" stroke="none" />
          </g>
        </svg>

        <p class="modal-lead" style="margin-bottom: 12px">
          行くライブに合わせて自由にメモしてね！入力した内容は自動で保存されます📝
        </p>
        <div class="save-status" id="save-status-text">自動保存完了</div>

        <div class="venue-header-card">
          <div class="venue-header-title">参戦するライブ・イベント名</div>
          <input type="text" id="venue-live-name" class="live-title-input" placeholder="例: OSHI LIVE TOUR 2026" />
        </div>

        <div class="form-section">
          <div class="form-section-title">会場情報・Googleマップ</div>
          <div class="input-field-group">
            <label for="venue-name">会場名</label>
            <input type="text" id="venue-name" class="input-text" placeholder="例: 日本武道館 / 横浜アリーナ" />
          </div>
          <div class="input-field-group">
            <label for="venue-address">会場の住所</label>
            <input
              type="text"
              id="venue-address"
              class="input-text"
              placeholder="例: 東京都千代田区北の丸公園1-1"
              oninput="updateMapPreview()"
            />
          </div>
          <div id="map-preview" class="map-container">
            <span>住所を入力するとここにMapが表示されます</span>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">電車・徒歩アクセス</div>
          <div class="input-field-group">
            <label for="venue-station">最寄駅</label>
            <input type="text" id="venue-station" class="input-text" placeholder="例: 九段下駅（徒歩5分） / 新横浜駅" />
          </div>
          <div class="input-field-group">
            <label for="venue-walk-memo">駅から会場までのアクセスメモ・マップ画像</label>
            <textarea
              id="venue-walk-memo"
              class="input-textarea"
              placeholder="例: 2番出口を出て直進、歩道橋を渡ってすぐ！"
            ></textarea>
            <div class="img-upload-box">
              <label class="file-input-btn" for="map-img-file">徒歩ルート・駅構内マップ画像を載せる</label>
              <input
                type="file"
                id="map-img-file"
                class="file-input-real"
                accept="image/*"
                onchange="handleImageUpload('map-img-file', 'map-img-preview', 'venue_img_map')"
              />
              <img id="map-img-preview" class="img-preview" alt="徒歩マップ画像" />
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">自宅からの道のり</div>
          <div class="input-field-group">
            <label for="venue-route-memo">乗り換えルート・所要時間メモ</label>
            <textarea
              id="venue-route-memo"
              class="input-textarea"
              placeholder="例: ○○駅 09:30発 ➔ 〇〇線 ➔ 〇〇駅乗り換え ➔ 最寄駅 10:45着"
            ></textarea>
            <div class="img-upload-box">
              <label class="file-input-btn" for="route-img-file">乗り換え案内などのスクリーンショットを載せる</label>
              <input
                type="file"
                id="route-img-file"
                class="file-input-real"
                accept="image/*"
                onchange="handleImageUpload('route-img-file', 'route-img-preview', 'venue_img_route')"
              />
              <img id="route-img-preview" class="img-preview" alt="ルート画像" />
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">終電＆周辺のお役立ちスポット</div>
          <div class="input-field-group">
            <label for="venue-last-train">終電時間メモ</label>
            <input
              type="text"
              id="venue-last-train"
              class="input-text"
              placeholder="例: 最寄駅 22:45発が最終！（ロッカー回収を忘れずに）"
            />
          </div>
          <div class="input-field-group">
            <label for="venue-facilities">近隣施設（コンビニ・飲食店・100均など）</label>
            <textarea
              id="venue-facilities"
              class="input-textarea"
              placeholder="例: 駅前にセブンあり。100均は隣の駅のSeria。プリ機は駅構内。"
            ></textarea>
          </div>
        </div>

        <svg
          class="sticker stk-glasses"
          style="bottom: -15px; left: -10px"
          viewBox="0 0 100 80"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g stroke="#7d6b5e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="12" y="22" width="32" height="42" rx="10" fill="#fff" stroke="#fff" stroke-width="10" />
            <rect x="56" y="22" width="32" height="42" rx="10" fill="#fff" stroke="#fff" stroke-width="10" />
            <rect x="12" y="22" width="32" height="42" rx="8" fill="#e0f2fe" />
            <rect x="56" y="22" width="32" height="42" rx="8" fill="#e0f2fe" />
            <rect x="40" y="32" width="20" height="10" rx="2" fill="#bae6fd" />
            <circle cx="28" cy="52" r="11" fill="#7dd3fc" />
            <circle cx="72" cy="52" r="11" fill="#7dd3fc" />
            <path
              d="M 42,30 C 35,25 35,35 48,32 C 38,42 45,43 50,33 C 55,43 62,42 52,32 C 65,35 65,25 58,30 Z"
              fill="#f2a6b4"
              stroke-width="2"
            />
          </g>
        </svg>
      </div>

      <div class="footer-space"></div>
    </div>

    <script src="sub-page-sync.js"></script>
    <script>
      const textFields = [
        "venue-live-name",
        "venue-name",
        "venue-address",
        "venue-station",
        "venue-walk-memo",
        "venue-route-memo",
        "venue-last-train",
        "venue-facilities",
      ];

      window.addEventListener("DOMContentLoaded", () => {
        textFields.forEach((id) => {
          const el = document.getElementById(id);
          const savedValue = localStorage.getItem(`venue_text_${id}`);
          if (savedValue) {
            el.value = savedValue;
          }

          el.addEventListener("input", () => {
            localStorage.setItem(`venue_text_${id}`, el.value);
            showSaveStatus();
          });
        });

        updateMapPreview();
        loadSavedImage("map-img-preview", "venue_img_map");
        loadSavedImage("route-img-preview", "venue_img_route");
      });

      function updateMapPreview() {
        const address = document.getElementById("venue-address").value.trim();
        const mapContainer = document.getElementById("map-preview");

        if (address) {
          const encodedAddress = encodeURIComponent(address);
          mapContainer.innerHTML = `<iframe src="https://maps.google.com/maps?q=${encodedAddress}&output=embed" allowfullscreen loading="lazy"></iframe>`;
        } else {
          mapContainer.innerHTML = `<span>住所を入力するとここにMapが表示されます</span>`;
        }
      }

      function handleImageUpload(inputId, previewId, storageKey) {
        const fileInput = document.getElementById(inputId);
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const base64Image = e.target.result;
          const imgPreview = document.getElementById(previewId);
          imgPreview.src = base64Image;
          imgPreview.style.display = "block";

          try {
            localStorage.setItem(storageKey, base64Image);
            showSaveStatus();
          } catch (err) {
            alert("画像サイズが大きすぎるため保存できませんでした。少し小さめの画像をお試しください！");
          }
        };
        reader.readAsDataURL(file);
      }

      function loadSavedImage(previewId, storageKey) {
        const savedImage = localStorage.getItem(storageKey);
        if (savedImage) {
          const imgPreview = document.getElementById(previewId);
          imgPreview.src = savedImage;
          imgPreview.style.display = "block";
        }
      }

      function showSaveStatus() {
        const statusEl = document.getElementById("save-status-text");
        statusEl.innerText = "✨ 自動保存中...";
        setTimeout(() => {
          statusEl.innerText = "💾 自動保存完了";
        }, 600);
      }
    </script>
  </body>
</html>
